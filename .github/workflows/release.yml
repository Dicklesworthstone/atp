name: Release

# Builds the standalone `atp` binary from the canonical asupersync source tree
# at the exact commit pinned in UPSTREAM_REV, then publishes platform archives
# + SHA256SUMS as a GitHub release. This repo intentionally contains no Rust
# source: https://github.com/Dicklesworthstone/asupersync is the single source
# of truth for ATP code.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing stable release tag (e.g. v0.3.8).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Serialize every publication. Different version tags must not race when
  # deciding which stable release is newest.
  group: release-publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  UPSTREAM_REPO: Dicklesworthstone/asupersync

jobs:
  prepare:
    name: Resolve immutable release inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      upstream_rev: ${{ steps.release.outputs.upstream_rev }}
      existing_draft_id: ${{ steps.release.outputs.existing_draft_id }}
    steps:
      - name: Checkout release controller
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve tag, commit, and upstream pin
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable release tag: $tag (prereleases are not supported)" >&2
            exit 1
          fi

          git fetch --force --tags origin
          existing_sha="$(git rev-parse -q --verify "refs/tags/$tag^{commit}" 2>/dev/null || true)"
          if [ "$EVENT_NAME" = "push" ]; then
            if [ -z "$existing_sha" ]; then
              echo "Tag-push event did not resolve refs/tags/$tag" >&2
              exit 1
            fi
            event_commit="$(git rev-parse "$EVENT_SHA^{commit}")"
            if [ "$existing_sha" != "$event_commit" ]; then
              echo "Tag $tag moved after the push event: event=$event_commit current=$existing_sha" >&2
              exit 1
            fi
            release_sha="$existing_sha"
          elif [ -n "$existing_sha" ]; then
            release_sha="$existing_sha"
          else
            echo "Release tag $tag does not exist; create and push the immutable tag first" >&2
            exit 1
          fi

          git fetch --quiet --filter=blob:none origin main
          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "Release commit $release_sha is not contained in origin/main" >&2
            exit 1
          fi

          latest_stable="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1)"
          if [ "$tag" != "$latest_stable" ]; then
            echo "Release tag $tag is not the newest stable tag ($latest_stable); refusing a backfill that could replace latest" >&2
            exit 1
          fi

          release_api="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$tag"
          if ! release_status="$(curl -sS -o "$RUNNER_TEMP/release-lookup.json" \
            -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$release_api")"; then
            echo "Could not determine whether release $tag already exists" >&2
            exit 1
          fi
          existing_draft_id=''
          case "$release_status" in
            200)
              existing_tag="$(jq -r '.tag_name' "$RUNNER_TEMP/release-lookup.json")"
              existing_draft="$(jq -r '.draft' "$RUNNER_TEMP/release-lookup.json")"
              if [ "$existing_tag" != "$tag" ] || [ "$existing_draft" != "true" ]; then
                echo "Published release $tag already exists; refusing to replace immutable assets" >&2
                exit 1
              fi
              existing_draft_id="$(jq -r '.id' "$RUNNER_TEMP/release-lookup.json")"
              if [[ ! "$existing_draft_id" =~ ^[0-9]+$ ]]; then
                echo "Existing draft for $tag has an invalid release ID" >&2
                exit 1
              fi
              echo "Release $tag has resumable draft $existing_draft_id; it will be replaced after successful builds"
              ;;
            404) ;;
            *)
              echo "Release lookup for $tag failed with HTTP $release_status" >&2
              cat "$RUNNER_TEMP/release-lookup.json" >&2
              exit 1
              ;;
          esac

          upstream_rev="$(git show "$release_sha:UPSTREAM_REV" | tr -d '[:space:]')"
          if [[ ! "$upstream_rev" =~ ^[0-9a-f]{40}$ ]]; then
            echo "UPSTREAM_REV at $release_sha must be one lowercase 40-hex commit SHA" >&2
            exit 1
          fi

          {
            echo "release_tag=$tag"
            echo "release_sha=$release_sha"
            echo "upstream_rev=$upstream_rev"
            echo "existing_draft_id=$existing_draft_id"
          } >> "$GITHUB_OUTPUT"

  contracts:
    name: Distribution contracts (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          persist-credentials: false

      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Validate distribution scripts
        run: |
          bash -n install.sh scripts/build-atp.sh scripts/test-install.sh scripts/test-build-atp.sh
          shellcheck -S warning install.sh scripts/build-atp.sh scripts/test-install.sh scripts/test-build-atp.sh
          bash scripts/test-install.sh
          bash scripts/test-build-atp.sh

      - name: Validate workflows
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$(go env GOPATH)/bin/actionlint" .github/workflows/*.yml

  windows-contracts:
    name: Windows installer contracts
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          persist-credentials: false

      - name: Parse PowerShell with Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'scripts/test-install.ps1')) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file), [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -ne 0) {
              $parseErrors | ForEach-Object { [Console]::Error.WriteLine($_) }
              throw "Windows PowerShell 5.1 parse failed for $file"
            }
          }

      - name: Run installer contracts with Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\test-install.ps1

      - name: Parse PowerShell with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'scripts/test-install.ps1')) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file), [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -ne 0) {
              $parseErrors | ForEach-Object { [Console]::Error.WriteLine($_) }
              throw "PowerShell 7 parse failed for $file"
            }
          }

      - name: Run installer contracts with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\test-install.ps1

  build:
    name: Build ${{ matrix.target }}
    needs: [prepare, contracts, windows-contracts]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout atp repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          persist-credentials: false

      - name: Read upstream pin
        id: pin
        env:
          EXPECTED_REV: ${{ needs.prepare.outputs.upstream_rev }}
        run: |
          rev="$(tr -d '[:space:]' < UPSTREAM_REV)"
          if [[ ! "$rev" =~ ^[0-9a-f]{40}$ ]]; then
            echo "UPSTREAM_REV must be one lowercase 40-hex commit SHA" >&2
            exit 1
          fi
          if [ "$rev" != "$EXPECTED_REV" ]; then
            echo "Resolved release pin changed between prepare and build" >&2
            exit 1
          fi
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Checkout asupersync @ pinned rev
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.pin.outputs.rev }}
          path: upstream
          persist-credentials: false

      - name: Verify immutable upstream pin is on main
        env:
          REV: ${{ steps.pin.outputs.rev }}
        run: |
          actual="$(git -C upstream rev-parse HEAD)"
          if [ "$actual" != "$REV" ]; then
            echo "Upstream checkout mismatch: expected $REV, got $actual" >&2
            exit 1
          fi
          git -C upstream fetch --quiet --filter=blob:none origin main
          if ! git -C upstream merge-base --is-ancestor "$REV" origin/main; then
            echo "Pinned upstream commit $REV is not contained in origin/main" >&2
            exit 1
          fi

      - name: Guard — release tag must match the pinned crate version
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          want="${RELEASE_TAG#v}"
          have=$(grep -m1 '^version = "' upstream/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          if [ -z "$have" ]; then
            echo "Could not read package version from upstream/Cargo.toml" >&2; exit 1
          fi
          if [ "$want" != "$have" ]; then
            echo "Release tag $RELEASE_TAG does not match the pinned asupersync crate version $have." >&2
            echo "The atp binary would report 'atp $have'. Update UPSTREAM_REV or retag as v$have." >&2
            exit 1
          fi
          echo "Tag $RELEASE_TAG matches pinned crate version $have"

      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install pinned Rust toolchain
        working-directory: upstream
        run: |
          rustup toolchain install
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Build atp
        working-directory: upstream
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          export RUSTFLAGS="--remap-path-prefix=$GITHUB_WORKSPACE/upstream=/build/asupersync --remap-path-prefix=$HOME/.cargo=/cargo"
          cargo build --release --locked --bin atp --features atp-cli --target ${{ matrix.target }}

      - name: Package tarball
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist stage
          cp "upstream/target/$TARGET/release/atp" stage/atp
          strip stage/atp 2>/dev/null || true
          cp LICENSE stage/LICENSE
          epoch="$(git -C upstream show -s --format=%ct HEAD)"
          python3 - "$TARGET" "$epoch" <<'PY'
          import gzip
          import pathlib
          import sys
          import tarfile

          target, epoch_text = sys.argv[1:]
          epoch = int(epoch_text)
          output = pathlib.Path("dist") / f"atp-{target}.tar.gz"
          with output.open("wb") as raw:
              with gzip.GzipFile(fileobj=raw, mode="wb", mtime=0) as compressed:
                  with tarfile.open(fileobj=compressed, mode="w") as archive:
                      for name, mode in (("atp", 0o755), ("LICENSE", 0o644)):
                          path = pathlib.Path("stage") / name
                          info = archive.gettarinfo(str(path), arcname=name)
                          info.uid = info.gid = 0
                          info.uname = info.gname = ""
                          info.mode = mode
                          info.mtime = epoch
                          with path.open("rb") as source:
                              archive.addfile(info, source)
          PY

      - name: Package Windows ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist, stage | Out-Null
          Copy-Item "upstream/target/$env:TARGET/release/atp.exe" stage/atp.exe
          Copy-Item LICENSE stage/LICENSE

          $epochText = ((& git -C upstream show -s --format=%ct HEAD) | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $epochText -notmatch '^[0-9]+$') {
            throw "Could not resolve the pinned upstream commit timestamp: '$epochText'"
          }
          $timestamp = [DateTimeOffset]::FromUnixTimeSeconds([long]$epochText)
          $archive = [IO.Path]::GetFullPath("dist/atp-$env:TARGET.zip")
          if (Test-Path -LiteralPath $archive) { Remove-Item -LiteralPath $archive -Force }

          Add-Type -AssemblyName System.IO.Compression
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archiveStream = [IO.File]::Open(
            $archive, [IO.FileMode]::CreateNew, [IO.FileAccess]::Write, [IO.FileShare]::None
          )
          $zip = [IO.Compression.ZipArchive]::new(
            $archiveStream, [IO.Compression.ZipArchiveMode]::Create, $false
          )
          try {
            foreach ($name in @('atp.exe', 'LICENSE')) {
              $source = [IO.Path]::GetFullPath((Join-Path stage $name))
              $entry = $zip.CreateEntry($name, [IO.Compression.CompressionLevel]::Optimal)
              $entry.LastWriteTime = $timestamp
              $entry.ExternalAttributes = 0
              $input = [IO.File]::OpenRead($source)
              $output = $entry.Open()
              try {
                $input.CopyTo($output)
              } finally {
                $output.Dispose()
                $input.Dispose()
              }
            }
          } finally {
            $zip.Dispose()
            $archiveStream.Dispose()
          }

          $verifyZip = [IO.Compression.ZipFile]::OpenRead($archive)
          try {
            $entries = @($verifyZip.Entries | ForEach-Object FullName)
            if ($entries.Count -ne 2 -or ($entries -join ',') -cne 'atp.exe,LICENSE') {
              throw "Unexpected Windows archive entries or order: $($entries -join ', ')"
            }
            foreach ($entry in $verifyZip.Entries) {
              if ($entry.LastWriteTime.UtcDateTime -ne $timestamp.UtcDateTime) {
                $delta = [Math]::Abs(($entry.LastWriteTime.UtcDateTime - $timestamp.UtcDateTime).TotalSeconds)
                if ($delta -gt 2) {
                  throw "ZIP timestamp for $($entry.FullName) is not derived from the upstream commit"
                }
              }
            }
          } finally {
            $verifyZip.Dispose()
          }

      - name: Smoke-test binary
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          binary=./stage/atp
          if [ "$RUNNER_OS" = "Windows" ]; then binary=./stage/atp.exe; fi
          expected="atp ${RELEASE_TAG#v}"
          actual="$("$binary" --version)"
          if [ "$actual" != "$expected" ]; then
            echo "Built binary version mismatch: expected '$expected', got '$actual'" >&2
            exit 1
          fi
          "$binary" rq-keygen >/dev/null

      - name: Install Windows archive locally and verify TCP transfer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET: ${{ matrix.target }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $archive = (Resolve-Path "dist/atp-$env:TARGET.zip").Path
          $installDir = Join-Path $env:RUNNER_TEMP 'atp-windows-bin'
          $sourceDir = Join-Path $env:RUNNER_TEMP 'atp-tcp-source'
          $receiveDir = Join-Path $env:RUNNER_TEMP 'atp-tcp-received'
          $senderErr = Join-Path $env:RUNNER_TEMP 'atp-sender.stderr'
          $receiverOut = Join-Path $env:RUNNER_TEMP 'atp-receiver.stdout'
          $receiverErr = Join-Path $env:RUNNER_TEMP 'atp-receiver.stderr'
          Remove-Item $installDir, $sourceDir, $receiveDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $senderErr, $receiverOut, $receiverErr -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $sourceDir, $receiveDir | Out-Null

          $archiveHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\install.ps1 `
            -Offline $archive -Checksum $archiveHash -Version $env:RELEASE_TAG `
            -Dest $installDir -Force -Verify -Quiet
          if ($LASTEXITCODE -ne 0) {
            throw "install.ps1 rejected the built Windows archive with exit code $LASTEXITCODE"
          }

          $installed = Join-Path $installDir 'atp.exe'
          $expectedVersion = "atp $($env:RELEASE_TAG.TrimStart('v'))"
          $actualVersion = (& $installed --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $actualVersion -ne $expectedVersion) {
            throw "Locally installed binary version mismatch: expected '$expectedVersion', got '$actualVersion'"
          }
          & $installed rq-keygen | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'Locally installed rq-keygen smoke test failed' }

          $payload = Join-Path $sourceDir 'payload.bin'
          $bytes = New-Object byte[] (1024 * 1024)
          [Random]::new(8472).NextBytes($bytes)
          [IO.File]::WriteAllBytes($payload, $bytes)

          $receiver = Start-Process -FilePath $installed -ArgumentList @(
            'recv', $receiveDir, '--listen', '127.0.0.1:0',
            '--transport', 'tcp', '--once', '--no-delta'
          ) -RedirectStandardOutput $receiverOut -RedirectStandardError $receiverErr -PassThru
          try {
            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            $endpoint = $null
            while ([DateTime]::UtcNow -lt $deadline) {
              if ($receiver.HasExited) {
                throw "TCP receiver exited before readiness with code $($receiver.ExitCode): $(Get-Content $receiverErr -Raw)"
              }
              if (Test-Path $receiverErr) {
                $readyText = Get-Content $receiverErr -Raw
                if ($readyText -match 'atp: tcp listening on ([^,\s]+)') {
                  $endpoint = $Matches[1]
                  break
                }
              }
              Start-Sleep -Milliseconds 200
            }
            if (-not $endpoint) { throw "TCP receiver did not become ready: $(Get-Content $receiverErr -Raw)" }

            $senderLines = @(& $installed send $payload $endpoint --transport tcp --no-delta 2> $senderErr)
            $senderExit = $LASTEXITCODE
            $senderText = (($senderLines | ForEach-Object { [string]$_ }) -join "`n").Trim()
            if ($senderExit -ne 0) {
              throw "TCP sender failed with exit code ${senderExit}: $(Get-Content $senderErr -Raw)"
            }
            try {
              $senderReport = $senderText | ConvertFrom-Json
            } catch {
              throw "TCP sender did not emit one JSON report: '$senderText'"
            }
            if ($senderReport.event -cne 'atp_send' -or
                $senderReport.transport -cne 'tcp' -or
                $senderReport.committed -ne $true -or
                $senderReport.sha_ok -ne $true -or
                $senderReport.merkle_ok -ne $true) {
              throw "TCP sender report did not prove a committed SHA/Merkle-valid transfer: $senderText"
            }
            if (-not $receiver.WaitForExit(30000)) { throw 'TCP receiver did not exit after the one-shot transfer' }
            if ($receiver.ExitCode -ne 0) {
              throw "TCP receiver failed with code $($receiver.ExitCode): $(Get-Content $receiverErr -Raw)"
            }
          } finally {
            if (-not $receiver.HasExited) {
              Stop-Process -Id $receiver.Id -Force -ErrorAction SilentlyContinue
              $receiver.WaitForExit()
            }
          }

          $received = Join-Path $receiveDir 'payload.bin'
          if (-not (Test-Path $received)) { throw 'TCP transfer did not create the destination payload' }
          $receiverText = (Get-Content -LiteralPath $receiverOut -Raw).Trim()
          try {
            $receiverReport = $receiverText | ConvertFrom-Json
          } catch {
            throw "TCP receiver did not emit one JSON report: '$receiverText'"
          }
          if ($receiverReport.event -cne 'atp_receive' -or
              $receiverReport.transport -cne 'tcp' -or
              $receiverReport.committed -ne $true) {
            throw "TCP receiver report did not prove a committed transfer: $receiverText"
          }
          $sourceHash = (Get-FileHash -Algorithm SHA256 $payload).Hash
          $receivedHash = (Get-FileHash -Algorithm SHA256 $received).Hash
          if ($sourceHash -ne $receivedHash) {
            throw "TCP transfer hash mismatch: source=$sourceHash received=$receivedHash"
          }
          Write-Host "Windows install.ps1 and committed SHA-valid TCP transfer verified: $sourceHash"

      - name: Upload tarball
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atp-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Upload Windows ZIP
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atp-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [prepare, contracts, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout atp repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify complete asset set and assemble SHA256SUMS
        run: |
          cd dist
          ls -la
          expected=(
            atp-x86_64-unknown-linux-musl.tar.gz
            atp-x86_64-unknown-linux-gnu.tar.gz
            atp-aarch64-unknown-linux-musl.tar.gz
            atp-aarch64-unknown-linux-gnu.tar.gz
            atp-aarch64-apple-darwin.tar.gz
            atp-x86_64-apple-darwin.tar.gz
            atp-x86_64-pc-windows-msvc.zip
          )
          shopt -s nullglob
          actual=(atp-*.tar.gz atp-*.zip)
          if [ "${#actual[@]}" -ne "${#expected[@]}" ]; then
            echo "Expected ${#expected[@]} release archives, found ${#actual[@]}" >&2
            exit 1
          fi
          for asset in "${expected[@]}"; do
            if [ ! -f "$asset" ]; then
              echo "Missing required release asset: $asset" >&2
              exit 1
            fi
          done
          sha256sum "${expected[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

      - name: Create verified draft, upload exact assets, then publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
          UPSTREAM_REV: ${{ needs.prepare.outputs.upstream_rev }}
          EXISTING_DRAFT_ID: ${{ needs.prepare.outputs.existing_draft_id }}
        run: |
          notes="$RUNNER_TEMP/release-notes.md"
          cat > "$notes" <<EOF
          Standalone \`atp\` CLI binaries, built from the canonical
          [asupersync](https://github.com/Dicklesworthstone/asupersync) source at commit
          [\`$UPSTREAM_REV\`](https://github.com/Dicklesworthstone/asupersync/commit/$UPSTREAM_REV).

          Verify downloads against \`SHA256SUMS\`, or verify the GitHub build
          provenance with \`gh attestation verify <asset> --repo Dicklesworthstone/atp\`.
          Install this release with:

          \`\`\`bash
          curl -fsSL "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$RELEASE_TAG/install.sh" | \
            bash -s -- --version "$RELEASE_TAG"
          \`\`\`

          \`\`\`powershell
          & ([scriptblock]::Create((irm "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$RELEASE_TAG/install.ps1"))) -Version "$RELEASE_TAG" -Verify
          \`\`\`
          EOF

          if [ -n "$EXISTING_DRAFT_ID" ]; then
            existing_draft="$RUNNER_TEMP/existing-draft.json"
            gh api "repos/$GITHUB_REPOSITORY/releases/$EXISTING_DRAFT_ID" > "$existing_draft"
            if [ "$(jq -r '.id' "$existing_draft")" != "$EXISTING_DRAFT_ID" ] || \
               [ "$(jq -r '.tag_name' "$existing_draft")" != "$RELEASE_TAG" ] || \
               [ "$(jq -r '.draft' "$existing_draft")" != "true" ]; then
              echo "Existing release $EXISTING_DRAFT_ID is no longer the expected draft for $RELEASE_TAG" >&2
              exit 1
            fi
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$EXISTING_DRAFT_ID"
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --target "$RELEASE_SHA" \
            --title "atp $RELEASE_TAG" \
            --notes-file "$notes"

          draft_json="$RUNNER_TEMP/created-draft.json"
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > "$draft_json"
          draft_id="$(jq -r '.id' "$draft_json")"
          if [[ ! "$draft_id" =~ ^[0-9]+$ ]] || \
             [ "$(jq -r '.tag_name' "$draft_json")" != "$RELEASE_TAG" ] || \
             [ "$(jq -r '.draft' "$draft_json")" != "true" ]; then
            echo "Created release is not the expected draft for $RELEASE_TAG" >&2
            exit 1
          fi

          release_published=0
          cleanup_draft() {
            status=$?
            trap - EXIT
            if [ "$release_published" -eq 0 ] && [ -n "${draft_id:-}" ]; then
              current="$RUNNER_TEMP/cleanup-draft.json"
              if gh api "repos/$GITHUB_REPOSITORY/releases/$draft_id" > "$current" 2>/dev/null && \
                 [ "$(jq -r '.draft' "$current")" = "true" ] && \
                 [ "$(jq -r '.tag_name' "$current")" = "$RELEASE_TAG" ]; then
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$draft_id" || \
                  echo "Could not clean draft $draft_id; the next run will replace it" >&2
              fi
            fi
            exit "$status"
          }
          trap cleanup_draft EXIT

          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            dist/atp-*.tar.gz dist/atp-*.zip dist/SHA256SUMS

          expected='["SHA256SUMS","atp-aarch64-apple-darwin.tar.gz","atp-aarch64-unknown-linux-gnu.tar.gz","atp-aarch64-unknown-linux-musl.tar.gz","atp-x86_64-apple-darwin.tar.gz","atp-x86_64-pc-windows-msvc.zip","atp-x86_64-unknown-linux-gnu.tar.gz","atp-x86_64-unknown-linux-musl.tar.gz"]'
          actual="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,assets \
            --jq '[.isDraft, ([.assets[].name] | sort)]')"
          if [ "$actual" != "[true,$expected]" ]; then
            echo "Draft release asset verification failed: $actual" >&2
            exit 1
          fi

          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --draft=false --latest
          release_published=1
          published_state="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json isDraft --jq '.isDraft')"
          if [ "$published_state" != "false" ]; then
            echo "Release $RELEASE_TAG was not published successfully" >&2
            exit 1
          fi
          trap - EXIT
